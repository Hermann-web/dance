# CI: lint + unit tests on every push and PR.
# Activates once this codebase is published to its own repo (the workflow
# is a no-op while it lives under fairinternal/brainai/scratch/shared/dance/).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check dance/
          ruff format --check dance/

      - name: Tests
        run: pytest dance/tests/ -v --tb=short
